<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>أداة خلط الصبغات</title>
  <style>
    body { font-family: Tahoma; text-align: center; background: #fdfdfd; }
    h2 { color: #444; }
    label { font-weight: bold; }
    .color-box { width: 120px; height: 120px; margin: 20px auto; border: 1px solid #000; }
    select, button { margin: 10px; padding: 5px; }
  </style>
</head>
<body>
  <h2>اختيار لون الصبغة</h2>

  <label>لون الشعر الحالي:</label>
  <select id="baseColor">
    <option value="black">أسود</option>
    <option value="brown-medium">بني متوسط</option>
    <option value="brown-light">بني فاتح</option>
  </select>

  <br><br>
  <label>درجة من الكتالوج:</label>
  <select id="catalogColor">
    <option value="1.0">1.0 أسود مزرق</option>
    <option value="5.3">5.3 بني ذهبي فاتح</option>
    <option value="6.4">6.4 أشقر داكن نحاسي</option>
    <option value="7.6">7.6 أشقر متوسط أحمر</option>
    <option value="8.7">8.7 أشقر فاتح بنفسجي</option>
    <option value="9.1">9.1 أشقر رمادي فاتح جدا</option>
    <option value="10M">10M أشقر بلاتيني مطفي</option>
    <option value="12.75">12.75 أشقر بنفسجي ماهوجني</option>
    <!-- تقدر تضيف باقي الأكواد بنفس الشكل -->
  </select>

  <br><br>
  <button onclick="mixColors()">عرض النتيجة</button>

  <div id="result" class="color-box"></div>
  <p id="description"></p>

  <script>
    // قاعدة بيانات مع فهم عجلة الألوان
    const catalogDB = {
      "1.0": { name: "أسود مزرق", color: "#0a0f2b", neutralizes: "برتقالي" },
      "5.3": { name: "بني ذهبي فاتح", color: "#9c6b3f", neutralizes: "بنفسجي" },
      "6.4": { name: "أشقر داكن نحاسي", color: "#d46a3a", neutralizes: "أزرق" },
      "7.6": { name: "أشقر متوسط أحمر", color: "#c0392b", neutralizes: "أخضر" },
      "8.7": { name: "أشقر فاتح بنفسجي", color: "#9c27b0", neutralizes: "أصفر" },
      "9.1": { name: "أشقر رمادي فاتح جدا", color: "#e0d9d0", neutralizes: "ذهبي/أصفر" },
      "10M": { name: "أشقر بلاتيني مطفي", color: "#f2e6d8", neutralizes: "برتقالي/ذهبي" },
      "12.75": { name: "أشقر بنفسجي ماهوجني", color: "#b565a7", neutralizes: "أصفر/ذهبي" }
    };

    function mixColors() {
      const catalog = document.getElementById("catalogColor").value;
      if(catalogDB[catalog]) {
        document.getElementById("result").style.backgroundColor = catalogDB[catalog].color;
        document.getElementById("description").innerText =
          "النتيجة: " + catalogDB[catalog].name +
          " — هذا اللون يعادل/يلغي: " + catalogDB[catalog].neutralizes;
      } else {
        document.getElementById("result").style.backgroundColor = "#ccc";
        document.getElementById("description").innerText = "النتيجة غير موجودة في القاعدة";
      }
    }
  </script>
</body>
</html>
